<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter Country Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Country Filter</h1>
    <div class="input-group">
      <input type="text" id="countryInput" placeholder="Enter country name (e.g., Russia)">
      <button id="addBtn">Add</button>
    </div>
    <ul id="countryList"></ul>
    <button id="clearCacheBtn" class="secondary-btn">Clear Location Cache</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
